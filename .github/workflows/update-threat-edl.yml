name: Update Palo Threat EDL

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-threat-edl:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Build deduped threat feed EDL
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p threat

          # Source feeds - name|url|parser triples (order is preserved in the README)
          # Parsers:
          #   bare      - lines matching ^IPv4(/CIDR)?$ (ET, CINS, blocklist.de, BinaryDefense)
          #   spamhaus  - "1.2.3.0/24 ; SBL12345" style; strip trailing comment
          #   dshield   - tab-delimited; emit col1/col3 (DShield Top-20 /24s)
          SOURCES=(
            "emerging_threats|https://rules.emergingthreats.net/fwrules/emerging-Block-IPs.txt|bare"
            "emerging_threats_compromised|https://rules.emergingthreats.net/blockrules/compromised-ips.txt|bare"
            "cins_score|https://cinsscore.com/list/ci-badguys.txt|bare"
            "blocklist_de|https://opendbl.net/lists/blocklistde-all.list|bare"
            "spamhaus_drop|https://www.spamhaus.org/drop/drop.txt|spamhaus"
            "dshield_block|https://isc.sans.edu/block.txt|dshield"
            "binary_defense|https://www.binarydefense.com/banlist.txt|bare"
          )

          declare -A SOURCE_COUNTS
          COMBINED="$(mktemp)"
          : > "$COMBINED"

          parse_bare() {
            grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+(/[0-9]+)?$' "$1" | sort -u
          }

          parse_spamhaus() {
            # Lines look like: "1.10.16.0/20 ; SBL256894"
            # Skip header/comment lines starting with ';'
            awk '
              /^[[:space:]]*;/ { next }
              /^[[:space:]]*$/ { next }
              {
                # First whitespace-separated field is the CIDR
                print $1
              }
            ' "$1" \
              | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+(/[0-9]+)?$' \
              | sort -u
          }

          parse_dshield() {
            # Tab-delimited columns (real format on the wire, not what the
            # header comment claims):
            #   1: start of netblock (e.g. "64.62.197.0")
            #   2: end of netblock   (e.g. "64.62.197.255")
            #   3: CIDR bits         (e.g. "24") -- NOT the subnet IP
            #   4: number of targets
            #   5+: name, country, contact
            # Header/comment lines start with '#'. We emit col1/col3.
            awk -F'\t' '
              /^#/ { next }
              /^[[:space:]]*$/ { next }
              $1 ~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/ && $3 ~ /^[0-9]+$/ {
                print $1 "/" $3
              }
            ' "$1" | sort -u
          }

          for entry in "${SOURCES[@]}"; do
            IFS='|' read -r name url parser <<<"$entry"
            tmp="$(mktemp)"

            echo "Fetching $name from $url..."
            http_code=$(curl -fsSL --max-time 60 \
              -A "Mozilla/5.0 (compatible; palo-threat-edl/1.0; +github-actions)" \
              -w '%{http_code}' \
              -o "$tmp" "$url" 2>/dev/null) || {
              echo "  WARN: failed to fetch $name (http=${http_code:-?}), skipping"
              SOURCE_COUNTS[$name]=0
              continue
            }
            echo "  http=${http_code} bytes=$(wc -c < "$tmp")"

            case "$parser" in
              bare)      parse_bare     "$tmp" > "${tmp}.clean" ;;
              spamhaus)  parse_spamhaus "$tmp" > "${tmp}.clean" ;;
              dshield)   parse_dshield  "$tmp" > "${tmp}.clean" ;;
              *)
                echo "  WARN: unknown parser '$parser' for $name, skipping"
                SOURCE_COUNTS[$name]=0
                continue
                ;;
            esac

            count=$(wc -l < "${tmp}.clean")
            SOURCE_COUNTS[$name]=$count
            cat "${tmp}.clean" >> "$COMBINED"
            echo "  -> $name: $count entries"
          done

          OUT_FILE="threat/combined-threat-ips.txt"

          python3 - "$COMBINED" > "$OUT_FILE" <<'PY'
          import sys, ipaddress
          nets = set()
          with open(sys.argv[1]) as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      nets.add(ipaddress.ip_network(line, strict=False))
                  except ValueError:
                      pass
          v4 = sorted(ipaddress.collapse_addresses([n for n in nets if n.version == 4]))
          v6 = sorted(ipaddress.collapse_addresses([n for n in nets if n.version == 6]))
          for n in v4 + v6:
              print(n)
          PY

          FINAL_COUNT=$(wc -l < "$OUT_FILE")

          RAW_TOTAL=0
          for entry in "${SOURCES[@]}"; do
            name="${entry%%|*}"
            RAW_TOTAL=$((RAW_TOTAL + ${SOURCE_COUNTS[$name]:-0}))
          done
          SAVED=$((RAW_TOTAL - FINAL_COUNT))

          REPO_RAW="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/threat"

          {
            echo "# Palo Alto Threat Feed EDL"
            echo
            echo "Combined and deduplicated threat IP feeds from multiple sources. Adjacent CIDRs are aggregated. Use this as a single IP List EDL in Palo in place of the per-source EDLs to save capacity."
            echo
            echo "## Sources"
            echo
            echo "| Source | Raw Count | URL |"
            echo "| ------ | --------- | --- |"
            for entry in "${SOURCES[@]}"; do
              IFS='|' read -r name url parser <<<"$entry"
              count="${SOURCE_COUNTS[$name]:-FAIL}"
              echo "| ${name} | ${count} | \`${url}\` |"
            done
            echo
            echo "## Output"
            echo
            echo "- **Combined EDL URL:** \`${REPO_RAW}/combined-threat-ips.txt\`"
            echo "- **Final entry count:** ${FINAL_COUNT}"
            echo "- **Raw total (sum of all sources):** ${RAW_TOTAL}"
            echo "- **Slots saved vs. running them separately:** ${SAVED}"
            echo "- **Last updated UTC:** $(date -u '+%Y-%m-%d %H:%M:%S')"
          } > threat/README.md

          # Warn if we're still close to the PA-440 IP EDL cap
          if [ "$FINAL_COUNT" -gt 45000 ]; then
            echo "::warning::Combined EDL has ${FINAL_COUNT} entries — approaching the 50k PA-440 cap"
          fi

      - name: Commit updated threat EDL
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add threat/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update threat feed EDL"
            git push
          fi
